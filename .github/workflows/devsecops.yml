name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit detect-secrets
          pip install -r app/requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Bandit SAST (Hard Gate - blocks on High/Medium)
        run: bandit -r app/ -f txt -o reports/bandit_report.txt --severity-level medium

      - name: Run pip-audit (Hard Gate - blocks on any CVE)
        run: pip-audit -r app/requirements.txt

      - name: Run Semgrep (Hard Gate)
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Run detect-secrets (Hard Gate)
        run: |
          detect-secrets scan --all-files \
            --exclude-files 'venv/.*' \
            --exclude-files 'reports/.*' \
            --exclude-files '.pytest_cache/.*' \
            > reports/secrets_report.json
          python -c "
          import json
          with open('reports/secrets_report.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          non_env = {k: v for k, v in results.items() if k != '.env'}
          if non_env:
              print('FAILED: Secrets found in code!')
              exit(1)
          print('detect-secrets passed!')
          "

      - name: Run Tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/
